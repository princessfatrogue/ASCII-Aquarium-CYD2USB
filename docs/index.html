<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>ASCII Aquarium CYD Flasher</title>
    <script
      type="module"
      src="https://unpkg.com/esp-web-tools@10/dist/web/install-button.js?module">
    </script>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #06151f;
        color: white;
        font-family: Arial, sans-serif;
      }

      main {
        width: min(680px, calc(100% - 32px));
        text-align: center;
      }

      h1 {
        font-size: 42px;
        margin-bottom: 8px;
      }

      p {
        color: #b8d7e6;
        font-size: 18px;
        line-height: 1.5;
      }

      button {
        margin-top: 24px;
        padding: 16px 24px;
        border: 0;
        border-radius: 8px;
        background: #20c997;
        color: #041011;
        font-size: 20px;
        font-weight: 700;
        cursor: pointer;
      }

      .note {
        margin-top: 28px;
        font-size: 15px;
        color: #8fb6c9;
      }
    </style>
  </head>

  <body>
    <main>
      <h1>ASCII Aquarium CYD</h1>
      <p>Flash the ASCII fish tank directly to your CYD from the browser.</p>

      <esp-web-install-button manifest="manifest.json">
        <button slot="activate">Flash ASCII Aquarium</button>
        <span slot="unsupported">Use Chrome or Edge on a desktop computer.</span>
        <span slot="not-allowed">This page needs HTTPS to flash your CYD.</span>
      </esp-web-install-button>

      <p class="note">
        Plug in your CYD with a data USB-C cable, close Arduino IDE Serial Monitor,
        then click the button.
      </p>
    </main>
  </body>
</html>
